apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: instruct
  annotations:
    security.opendatahub.io/enable-auth: "false"
    serving.kserve.io/deploymentMode: RawDeployment
  labels:
    networking.kserve.io/visibility: cluster-local
    ai-services.io/application: {{ .Release.Name }}
    ai-services.io/template: {{ .Chart.Name }}
    ai-services.io/version: {{ default .Chart.AppVersion | quote }}
spec:
  predictor:
    automountServiceAccountToken: false
    deploymentStrategy:
      type: Recreate
    maxReplicas: 1
    minReplicas: 1
    model:
      args:
      - '--tensor-parallel-size=4 '
      - '--max-model-len={{ .Values.instruct.model.maxModelLen }} '
      - '--max-num-seqs={{ .Values.instruct.model.maxBatchSize }}'
      - --served-model-name={{ .Values.instruct.model.name }}
      env:
      - name: VLLM_SPYRE_USE_CB
        value: "1"
      {{- if .Values.instruct.apiKey }}
      - name: VLLM_API_KEY
        valueFrom:
          secretKeyRef:
            name: vllm-instruct-api-key
            key: apiKey
      {{- end }}
      modelFormat:
        name: vLLM
      resources:
        limits:
          cpu: "12"
          memory: "150Gi"
          ibm.com/spyre_pf: "4"
        requests:
          cpu: "12"
          memory: "150Gi"
          ibm.com/spyre_pf: "4"
      runtime: spyre-temp
      storageUri: {{ .Values.instruct.storageUri }}
