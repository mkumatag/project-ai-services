pods:
  - name: "{{ .AppName }}--similarity-api"
    format: "index .Ports \"7000/tcp\" 0"
    default: ""
    alias: SIMILARITY_API_PORT

containers:
  - name: "{{ .AppName }}--similarity-api-similarity-api"
    format: ".Status"
    alias: SIMILARITY_API_STATUS

hosts:
  - fetch: HOST_IP
    type: ip

